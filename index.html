<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>墨迹大侠集字自动计算器总汇</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Noto Serif SC',serif;
background:
radial-gradient(circle at 30% 20%,rgba(255,210,120,0.15),transparent),
radial-gradient(circle at 80% 70%,rgba(255,160,60,0.15),transparent),
linear-gradient(180deg,#0b0705,#1a110a,#0b0705);
color:#f6e3b0;
min-height:100vh;
overflow-x:hidden;
}

/* 龙纹背景纹理 */

body::after{
content:"";
position:fixed;
inset:0;
background:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
opacity:0.25;
pointer-events:none;
}

/* 粒子 */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* loader */

.loader{
position:fixed;
inset:0;
background:#0b0705;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader span{
font-size:26px;
letter-spacing:4px;
color:#ffd98a;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{opacity:0.3}
to{opacity:1;text-shadow:0 0 15px #ffd98a}
}

.container{
max-width:1100px;
margin:auto;
padding:30px 16px 60px;
position:relative;
z-index:2;
}

h1{
text-align:center;
font-size:clamp(28px,5vw,42px);
margin-bottom:40px;
letter-spacing:4px;
color:#ffe7b0;
text-shadow:
0 0 10px rgba(255,200,120,0.6),
0 0 30px rgba(255,160,60,0.4);
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

/* card */

.card{
position:relative;
border-radius:16px;
overflow:hidden;
text-decoration:none;
background:linear-gradient(145deg,#2a1c11,#1a120a);
box-shadow:
0 8px 18px rgba(0,0,0,0.7),
0 0 10px rgba(255,200,120,0.2);
transition:all .35s ease;
transform-style:preserve-3d;
}

/* 流光边框 */

.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:18px;
background:linear-gradient(
120deg,
#a87c3f,
#ffd27a,
#a87c3f,
#ffd27a
);
background-size:300%;
animation:borderMove 6s linear infinite;
z-index:0;
}

@keyframes borderMove{
0%{background-position:0%}
100%{background-position:300%}
}

/* 扫光 */

.card::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
transform:skewX(-25deg);
transition:0.7s;
z-index:3;
}

.card:hover::after{
left:150%;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:
0 18px 35px rgba(0,0,0,0.9),
0 0 30px rgba(255,210,130,0.6);
}

.card img{
position:relative;
z-index:2;
width:100%;
aspect-ratio:16/9;
object-fit:cover;
border-bottom:1px solid rgba(255,220,160,0.2);
}

.card-body{
position:relative;
z-index:2;
padding:16px;
text-align:center;
}

.subtitle{
font-size:14px;
color:#e7c98d;
margin-bottom:6px;
}

.week{
font-size:20px;
font-weight:700;
color:#fff4d4;
text-shadow:0 0 6px rgba(255,210,120,0.6);
}

/* ripple */

.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.4);
transform:scale(0);
animation:ripple 0.6s linear;
pointer-events:none;
z-index:10;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

.footer{
text-align:center;
margin-top:50px;
font-size:13px;
color:#caa86a;
opacity:0.8;
}

@media(max-width:480px){

.grid{gap:12px}

.card-body{padding:12px}

.week{font-size:18px}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="loader" id="loader">
<span>江湖加载中...</span>
</div>

<div class="container">

<h1>墨迹大侠 · 集字自动计算器</h1>
<div style="text-align:center;font-size:12px;color:#caa86a;margin-top:-20px;margin-bottom:30px;">
  本站仅提供信息展示与工具计算服务
</div>
<div class="grid" id="list"></div>

<div class="footer">
  <div>江湖秘籍 · 自动计算</div>

  <div style="margin-top:10px;font-size:12px;opacity:0.8;">
    本网站为信息整理与展示平台，仅供学习与参考使用
  </div>

  <div style="font-size:12px;opacity:0.8;">
    不涉及交易、支付或用户隐私收集
  </div>

  <div style="margin-top:6px;">
    <a href="/about.html" style="color:#e7c98d;text-decoration:none;">关于我们</a>
  </div>
</div>

</div>

<script>

/* 粒子 */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
v:Math.random()*0.5+0.2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.y+=p.v
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="rgba(255,215,120,0.8)"
ctx.fill()
})

requestAnimationFrame(draw)

}

draw()

/* 数据加载 */

const loader=document.getElementById("loader")

fetch("data.json?v=" + Date.now())
.then(r=>r.json())
.then(data=>{

data.sort((a,b)=>new Date(b.date)-new Date(a.date))

const list=document.getElementById("list")

data.forEach(item=>{

const card=document.createElement("a")

card.className="card"
card.href=item.url
card.target="_self"

card.innerHTML=`
<img loading="lazy" src="${item.cover}">
<div class="card-body">
<div class="subtitle">${item.subtitle || ""}</div>
<div class="week">${item.title}</div>
</div>
`

card.addEventListener("click",function(e){
console.log("仅供信息展示，不涉及交易")
const ripple=document.createElement("span")
ripple.className="ripple"

const rect=card.getBoundingClientRect()
const size=120

ripple.style.width=size+"px"
ripple.style.height=size+"px"
ripple.style.left=e.clientX-rect.left-size/2+"px"
ripple.style.top=e.clientY-rect.top-size/2+"px"

card.appendChild(ripple)

setTimeout(()=>ripple.remove(),600)

})

list.appendChild(card)

})

loader.style.display="none"

})

</script>

</body>
</html>
